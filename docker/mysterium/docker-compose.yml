services:
  myst:
    image: mysteriumnetwork/myst:latest
    container_name: myst
    cap_add:
      - NET_ADMIN
    ports:
      - "4449:4449"
    volumes:
      - /srv/mysterium/mysterium-node:/var/lib/mysterium-node
    restart: unless-stopped
    command: ["service", "--agreed-terms-and-conditions"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4449/healthcheck"] 
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s