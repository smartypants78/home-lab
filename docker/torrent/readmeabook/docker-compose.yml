services:
  readmeabook:
    image: ghcr.io/kikootwo/readmeabook:latest
    container_name: readmeabook
    network_mode: container:gluetun
    restart: unless-stopped
    volumes:
      - /srv/readmeabook/config:/app/config
      - /srv/readmeabook/cache:/app/cache
      - /media/external/downloads:/downloads        # Your download client's path
      - /media/external2/audiobooks:/media          # Your audiobook library
      - ./pgdata:/var/lib/postgresql/data
      - ./redis:/var/lib/redis
    environment:
      PUID: 1000                      
      PGID: 1000   